# DOSBox config to run the XFER.COM agent with COM1 wired to a TCP nullmodem
# socket, so `host.py --tcp 127.0.0.1:4555` (or mountfs.py) can drive it without
# real hardware.  Used by run_dosbox.sh, which substitutes @WORK@ for the build
# dir; you can also point [autoexec] `mount c` at any dir holding XFER.COM.
#
# transparent:1 makes the nullmodem a raw byte pipe (no DOSBox line-state bytes),
# which is required for the binary-safe COBS stream.  DOSBox listens on TCP 4555
# (no "server:" key => server mode); the host connects to it as the TCP client.

[serial]
serial1 = nullmodem port:4555 transparent:1

[autoexec]
mount c @WORK@
c:
XFER.COM
exit
